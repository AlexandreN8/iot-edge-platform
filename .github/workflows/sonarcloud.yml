name: SonarCloud Scan

on:
  push:
    branches: [main]
    paths:
      - 'edge/**'
      - 'paas/**'
      - '.github/workflows/sonarcloud.yml'
  pull_request:
    paths:
      - 'edge/**'
      - 'paas/**'
      - '.github/workflows/sonarcloud.yml'

jobs:
  test-all:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - path: edge/edge_processor
            name: edge_processor
          - path: edge/iot_devices
            name: iot_devices
          - path: edge/ota_agent
            name: ota_agent
          - path: paas/services/cleaner
            name: cleaner
          - path: paas/services/anomaly_detector
            name: anomaly_detector
          - path: paas/services/aggregator
            name: aggregator
          - path: paas/services/alert_service
            name: alert_service
          - path: paas/services/error_handler
            name: error_handler
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install and test
        working-directory: ${{ matrix.path }}
        run: |
          pip install -r requirements.txt -r requirements-dev.txt
          pytest --cov=. --cov-report=xml
      - uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.name }}
          path: ${{ matrix.path }}/coverage.xml

  sonarcloud:
    runs-on: ubuntu-latest
    needs: test-all
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/download-artifact@v4
        with:
          name: coverage-edge_processor
          path: edge/edge_processor
      - uses: actions/download-artifact@v4
        with:
          name: coverage-iot_devices
          path: edge/iot_devices
      - uses: actions/download-artifact@v4
        with:
          name: coverage-ota_agent
          path: edge/ota_agent
      - uses: actions/download-artifact@v4
        with:
          name: coverage-cleaner
          path: paas/services/cleaner
      - uses: actions/download-artifact@v4
        with:
          name: coverage-anomaly_detector
          path: paas/services/anomaly_detector
      - uses: actions/download-artifact@v4
        with:
          name: coverage-aggregator
          path: paas/services/aggregator
      - uses: actions/download-artifact@v4
        with:
          name: coverage-alert_service
          path: paas/services/alert_service
      - uses: actions/download-artifact@v4
        with:
          name: coverage-error_handler
          path: paas/services/error_handler
      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.organization=alexandren8
            -Dsonar.projectKey=AlexandreN8_iot-edge-platform
            -Dsonar.sources=edge/edge_processor,edge/iot_devices,edge/ota_agent,paas/services/cleaner,paas/services/anomaly_detector,paas/services/aggregator,paas/services/alert_service,paas/services/error_handler
            -Dsonar.python.coverage.reportPaths=edge/edge_processor/coverage.xml,edge/iot_devices/coverage.xml,edge/ota_agent/coverage.xml,paas/services/cleaner/coverage.xml,paas/services/anomaly_detector/coverage.xml,paas/services/aggregator/coverage.xml,paas/services/alert_service/coverage.xml,paas/services/error_handler/coverage.xml
            -Dsonar.coverage.exclusions=**/main.py