name: SonarCloud Scan

on:
  push:
    branches: [main]
    paths:
      - 'edge/**'
      - 'paas/**'
      - '.github/workflows/sonarcloud.yml'
  pull_request:
    paths:
      - 'edge/**'
      - 'paas/**'
      - '.github/workflows/sonarcloud.yml'

jobs:
  test-all:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - path: edge/edge_processor
            name: edge_processor
          - path: edge/iot_devices
            name: iot_devices
          - path: paas/services/cleaner
            name: cleaner
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install and test
        working-directory: ${{ matrix.path }}
        run: |
          pip install -r requirements.txt -r requirements-dev.txt
          pytest --cov=. --cov-report=xml
      - uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.name }}
          path: ${{ matrix.path }}/coverage.xml

  sonarcloud:
    runs-on: ubuntu-latest
    needs: test-all
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/download-artifact@v4
        with:
          name: coverage-edge_processor
          path: edge/edge_processor
      - uses: actions/download-artifact@v4
        with:
          name: coverage-iot_devices
          path: edge/iot_devices
      - uses: actions/download-artifact@v4
        with:
          name: coverage-cleaner
          path: paas/services/cleaner
      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.organization=alexandren8
            -Dsonar.projectKey=AlexandreN8_iot-edge-platform
            -Dsonar.sources=edge/edge_processor,edge/iot_devices,paas/services/cleaner
            -Dsonar.python.coverage.reportPaths=edge/edge_processor/coverage.xml,edge/iot_devices/coverage.xml,paas/services/cleaner/coverage.xml