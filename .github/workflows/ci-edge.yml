name: CI - Edge

on:
  push:
    paths:
      - 'edge/**'
      - '.github/workflows/ci-edge.yml'
  pull_request:
    paths:
      - 'edge/**'
      - '.github/workflows/ci-edge.yml'

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [edge_processor, iot_devices]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Lint, install, test
        working-directory: edge/${{ matrix.service }}
        run: |
          pip install -r requirements.txt -r requirements-dev.txt
          ruff check .
          pytest --cov=. --cov-report=xml

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.service }}
          path: edge/${{ matrix.service }}/coverage.xml

      - name: Build image
        run: docker build -t ${{ matrix.service }}:ci ./edge/${{ matrix.service }}

      - name: Scan with Trivy
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ matrix.service }}:ci
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: '1'
  
  sonarcloud:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download edge_processor coverage
        uses: actions/download-artifact@v4
        with:
          name: coverage-edge_processor
          path: edge/edge_processor

      - name: Download iot_devices coverage
        uses: actions/download-artifact@v4
        with:
          name: coverage-iot_devices
          path: edge/iot_devices

      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          projectBaseDir: edge
          args: >
            -Dsonar.organization=alexandren8
            -Dsonar.projectKey=AlexandreN8_iot-edge-platform-edge
            -Dsonar.python.coverage.reportPaths=edge_processor/coverage.xml,iot_devices/coverage.xml
            -Dsonar.exclusions=mosquitto/**,**/__pycache__/**,**/.venv/**
