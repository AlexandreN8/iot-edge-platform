name: CI - Edge

on:
  push:
    paths:
      - 'edge/**'
      - '.github/workflows/ci-edge.yml'
  pull_request:
    paths:
      - 'edge/**'
      - '.github/workflows/ci-edge.yml'

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [edge_processor, iot_devices]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Lint, install, test
        working-directory: edge/${{ matrix.service }}
        run: |
          pip install -r requirements.txt -r requirements-dev.txt
          ruff check .
          pytest --cov=. --cov-report=xml

      - name: Build image
        run: docker build -t ${{ matrix.service }}:ci ./edge/${{ matrix.service }}

      - name: Scan with Trivy
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ matrix.service }}:ci
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: '1'