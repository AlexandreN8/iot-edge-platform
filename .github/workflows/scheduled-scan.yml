name: Scheduled vulnerability re-scan

on:
  schedule:
    - cron: '0 3 * * 1'   # every Monday at 3:00 AM UTC

jobs:
  rescan-edge-processor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Rebuild image with fresh base
        run: docker build --pull -t edge-processor:rescan ./edge/edge_processor
      - name: Scan with Trivy (report only, no ignore-unfixed)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: edge-processor:rescan
          severity: CRITICAL,HIGH
          exit-code: '0'