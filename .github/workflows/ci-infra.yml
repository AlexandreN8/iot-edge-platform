name: CI - Infrastructure

on:
  pull_request:
    paths:
      - 'infra/**'
      - '.github/workflows/ci-infra.yml'
  push:
    branches: [main]
    paths:
      - 'infra/**'
      - '.github/workflows/ci-infra.yml'

jobs:
  validate:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        tier: [edge, paas]
    defaults:
      run:
        working-directory: infra/terraform/${{ matrix.tier }}
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_wrapper: false

      - name: terraform fmt
        run: terraform fmt -check -recursive

      - name: tflint
        uses: terraform-linters/setup-tflint@v6
      - name: tflint run (soft-fail - first pass, to be triaged)
        run: tflint --init && tflint
        continue-on-error: true

      - name: terraform init (no backend, no remote connect)
        run: terraform init -backend=false

      - name: terraform validate
        run: terraform validate

      - name: tfsec (soft-fail - first pass, to be triaged)
        uses: aquasecurity/tfsec-action@v1.0.3
        with:
          working_directory: infra/terraform/${{ matrix.tier }}
          soft_fail: true
          github_token: ${{ secrets.GITHUB_TOKEN }}

  secrets-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: gitleaks
        uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  ansible-check:
      runs-on: ubuntu-latest
      defaults:
        run:
          working-directory: infra/ansible
      env:
        ANSIBLE_VAULT_PASSWORD_FILE: /tmp/ci_vault_pass
      steps:
        - uses: actions/checkout@v4

        - name: Install Ansible + lint tools
          run: pip install ansible ansible-lint yamllint

        - name: Create CI-only placeholder vault password (never decrypts real secrets)
          run: echo "ci-placeholder-not-a-real-secret" > /tmp/ci_vault_pass

        - name: yamllint
          run: yamllint .

        - name: ansible-playbook --syntax-check
          run: |
            for f in playbooks/*.yml; do
              ansible-playbook "$f" --syntax-check
            done

        - name: ansible-lint (soft-fail - first pass, to be triaged)
          run: ansible-lint
          continue-on-error: true