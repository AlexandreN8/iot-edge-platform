---
- name: Ensure Docker SDK for Python is present (via apt, avoids PEP 668)
  ansible.builtin.apt:
    name: python3-docker
    state: present
    update_cache: true
  become: true

- name: Build anomaly_detector image
  community.docker.docker_image:
    name: "{{ anomaly_detector_image_name }}"
    build:
      path: "{{ anomaly_detector_build_context }}"
    source: build
    force_source: true
  register: anomaly_detector_image
  when: container_state | default('started') != 'absent'

- name: Ensure anomaly_detector container state
  community.docker.docker_container:
    name: "{{ anomaly_detector_container_name }}"
    image: "{{ anomaly_detector_image.image.Id if container_state | default('started') != 'absent' else omit }}"
    networks:
      - name: "{{ anomaly_detector_network_name }}"
    log_driver: fluentd
    log_options:
      fluentd-address: "localhost:24224"
      tag: "cleaner"
    env:
      KAFKA_BOOTSTRAP: "kafka:9092"
      OTEL_EXPORTER_ENDPOINT: "otel-collector:4317"
      PYTHONUNBUFFERED: "1"
    restart_policy: unless-stopped
    state: "{{ container_state | default('started') }}"
    image_name_mismatch: recreate
