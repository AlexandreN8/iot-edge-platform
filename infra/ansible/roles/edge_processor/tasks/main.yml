---
- name: Ensure Docker SDK for Python is present (via apt, avoids PEP 668)
  ansible.builtin.apt:
    name: python3-docker
    state: present
    update_cache: true
  become: true

- name: Ensure repo is cloned and up to date on the target host
  ansible.builtin.git:
    repo: "{{ edge_processor_repo_url }}"
    dest: "{{ edge_processor_repo_dest }}"
    version: "{{ deploy_branch | default('main') }}"
    force: true
  when: container_state | default('started') != 'absent'

- name: Build edge_processor image
  community.docker.docker_image:
    name: "{{ edge_processor_image_name }}"
    build:
      path: "{{ edge_processor_build_context }}"
    source: build
    force_source: true
  register: edge_processor_image
  when: container_state | default('started') != 'absent'

- name: Ensure edge_processor container state
  community.docker.docker_container:
    name: "{{ edge_processor_container_name }}"
    image: "{{ edge_processor_image.image.Id if container_state | default('started') != 'absent' else omit }}"
    networks:
      - name: "{{ edge_processor_network_name }}"
    env:
      BROKER_HOST: "{{ broker_host }}"
      BROKER_PORT: "{{ broker_port | string }}"
      KAFKA_BOOTSTRAP: "{{ kafka_bootstrap }}"
      PYTHONUNBUFFERED: "1"
    restart_policy: unless-stopped
    state: "{{ container_state | default('started') }}"
    image_name_mismatch: recreate
