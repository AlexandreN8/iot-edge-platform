apiVersion: 1

datasources:
  - name: IoT Postgres
    type: postgres
    uid: postgres-iot
    access: proxy
    url: postgres:5432
    user: iot
    isDefault: true
    editable: false
    secureJsonData:
      password: ${POSTGRES_PASSWORD}
    jsonData:
      database: iot
      sslmode: disable
      postgresVersion: 1600
      timescaledb: true

  - name: Prometheus
    type: prometheus
    uid: prometheus-iot
    access: proxy
    url: http://prometheus:9090
    isDefault: false
    editable: false
    jsonData:
      httpMethod: POST

  - name: Loki
    type: loki
    uid: loki-iot
    access: proxy
    url: http://loki:3100
    isDefault: false
    editable: false

  - name: Tempo
    type: tempo
    uid: tempo-iot
    access: proxy
    url: http://tempo:3200
    isDefault: false
    editable: false
    jsonData:
      tracesToLogsV2:
        datasourceUid: loki-iot
        spanStartTimeShift: "-5m"
        spanEndTimeShift: "5m"
        filterByTraceID: false
        filterBySpanID: false